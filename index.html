<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Acesso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0a0a0f; color: #e0e0e0; }
        .pin-display { background: #141419; border: 1px solid #333; border-radius: 12px; font-size: 28px; letter-spacing: 10px; padding: 16px; text-align: center; color: #0d6efd; font-family: monospace; }
        .num-btn { width: 70px; height: 70px; border-radius: 50%; border: 1px solid #333; background: #141419; color: #e0e0e0; font-size: 24px; font-weight: 600; }
        .num-btn:active { background: #0d6efd; border-color: #0d6efd; }
        .num-btn.wide { width: 160px; border-radius: 35px; }
        .num-btn.danger { color: #dc3545; }
        .footer { margin-top: 40px; }
        .hint { font-size: 13px; color: #888; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="container d-flex flex-column align-items-center justify-content-center" style="min-height:100dvh; max-width:400px">
        <div class="text-center mb-4">
            <h4 class="mb-1" style="color:#0d6efd">Playlist</h4>
            <small class="text-muted">Digite o PIN para acessar</small>
        </div>

        <div class="pin-display w-100 mb-4" id="pinDisplay"></div>

        <div id="errorMsg" class="text-danger small mb-2" style="min-height:20px"></div>

        <div class="d-flex flex-wrap justify-content-center gap-3" style="max-width:280px">
            <button class="num-btn" data-n="1">1</button>
            <button class="num-btn" data-n="2">2</button>
            <button class="num-btn" data-n="3">3</button>
            <button class="num-btn" data-n="4">4</button>
            <button class="num-btn" data-n="5">5</button>
            <button class="num-btn" data-n="6">6</button>
            <button class="num-btn" data-n="7">7</button>
            <button class="num-btn" data-n="8">8</button>
            <button class="num-btn" data-n="9">9</button>
            <button class="num-btn danger" id="btnClear">Limpar</button>
            <button class="num-btn" data-n="0">0</button>
            <button class="num-btn" id="btnBack"><</button>
        </div>

        <p class="hint">PIN: 6 dígitos</p>
    </div>

    <script>
        const CORRECT_PIN = '250728';
        let pin = '';

        const display = document.getElementById('pinDisplay');
        const errorMsg = document.getElementById('errorMsg');

        function render() {
            display.textContent = pin.padEnd(6, '·').split('').join(' ');
        }

        function checkPin() {
            if (pin.length === 6) {
                if (pin === CORRECT_PIN) {
                    sessionStorage.setItem('auth', 'ok');
                    window.location.href = 'recomendacoes_300.html';
                } else {
                    errorMsg.textContent = 'PIN incorreto';
                    pin = '';
                    render();
                }
            }
        }

        document.querySelectorAll('[data-n]').forEach(btn => {
            btn.addEventListener('click', () => {
                if (pin.length < 6) {
                    pin += btn.dataset.n;
                    render();
                    errorMsg.textContent = '';
                    checkPin();
                }
            });
        });

        document.getElementById('btnClear').addEventListener('click', () => {
            pin = '';
            render();
            errorMsg.textContent = '';
        });

        document.getElementById('btnBack').addEventListener('click', () => {
            pin = pin.slice(0, -1);
            render();
            errorMsg.textContent = '';
        });

        render();
    </script>
</body>
</html>
