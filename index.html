<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0a0a0f; color: #e0e0e0; }
        .card { background: #141419; border: 1px solid #222; transition: all .15s; }
        .card:hover { border-color: #0d6efd; transform: translateY(-2px); }
        a { color: #0d6efd; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container py-5 text-center" style="max-width:600px">
        <h1 class="mb-2" style="color:#0d6efd">🎵 Playlist</h1>
        <p class="text-muted mb-4">Baseado nas suas 2230 músicas</p>
        <div class="row g-3">
            <div class="col-12 col-sm-6">
                <a href="recomendacoes_300.html" class="card d-block p-4">
                    <h5 class="mb-1">300 Recomendações</h5>
                    <small class="text-muted">Novas músicas pra ouvir</small>
                </a>
            </div>
            <div class="col-12 col-sm-6">
                <a href="playlist_recomendada.html" class="card d-block p-4">
                    <h5 class="mb-1">Playlist Original</h5>
                    <small class="text-muted">96 músicas recomendadas antes</small>
                </a>
            </div>
        </div>
        <p class="text-muted small mt-4">Clique no ✕ para remover músicas que já ouviu</p>
    </div>
</body>
</html>
