        body { background: #0a0a0f; color: #e0e0e0; }
        .song-card { background: #141419; border: 1px solid #222; border-radius: 10px; transition: all .15s; }
        .song-card:hover { border-color: #333; background: #1a1a25; }
        .removed { display: none !important; }
        .song-card a { color: #0d6efd; text-decoration: none; flex: 1; padding: 12px 14px; font-size: 14px; }

        .btn-remove { background: none; border: none; color: #555; cursor: pointer; padding: 14px 20px; font-size: 22px; line-height: 1; border-radius: 0 10px 10px 0; min-width: 48px; min-height: 48px; touch-action: manipulation; -webkit-tap-highlight-color: rgba(220,53,69,0.2); }
        .btn-remove:hover { color: #dc3545; background: rgba(220,53,69,0.1); }
        .btn-remove:active { color: #dc3545; background: rgba(220,53,69,0.15); }
        .section-title { font-size: 17px; font-weight: 600; padding: 8px 0 8px 12px; border-bottom: 1px solid #222; margin: 28px 0 12px; }
        .text-muted-custom { color: #888; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0f; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    </style>

        const container = document.getElementById('playlist');
        let total = 0;
        sections.forEach(section => {
            let html = `<div class="section-title" style="border-left:4px solid ${section.color};color:${section.color}">${section.title}</div><div class="row g-2">`;
            section.songs.forEach(song => {
                const id = 's-' + total++;
                const q = encodeURIComponent(song + ' official');
                html += `<div class="col-12 col-sm-6 col-lg-4"><div class="song-card d-flex align-items-center" id="${id}">`;
                html += `<a href="https://www.youtube.com/results?search_query=${q}" target="_blank">${song}</a>`;
                html += `<button class="btn-remove" data-id="${id}" title="Remover">✕</button></div></div>`;
            });
            html += '</div>';
            container.insertAdjacentHTML('beforeend', html);
        });

        const removidas = getRemovidas();
        let visiveis = total;

        document.querySelectorAll('.song-card').forEach(w => {
            if (removidas.has(w.id)) {
                w.classList.add('removed');
                const col = w.closest('.col-12');
                if (col) col.classList.add('removed');
                visiveis--;
            }
        });
        updateCounter(total, visiveis);

        function removerMusica(btn) {
            const card = document.getElementById(btn.dataset.id);
            if (!card || card.classList.contains('removed')) return;
            const col = card.closest('.col-12');
            if (col) col.classList.add('removed');
            card.classList.add('removed');
            const set = getRemovidas();
            set.add(card.id);
            saveRemovidas(set);
            visiveis--;
            updateCounter(total, visiveis);
        }

        container.addEventListener('click', e => {
            const btn = e.target.closest('.btn-remove');
            if (btn) removerMusica(btn);
        });

        container.addEventListener('touchend', e => {
            const btn = e.target.closest('.btn-remove');
            if (btn) { e.preventDefault(); removerMusica(btn); }
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            localStorage.removeItem(STORAGE_KEY);
            document.querySelectorAll('.song-card.removed').forEach(w => {
                w.classList.remove('removed');
                const col = w.closest('.col-12');
                if (col) col.classList.remove('removed');
                visiveis++;
            });
            updateCounter(total, visiveis);
        });
